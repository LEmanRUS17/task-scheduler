framework:
    messenger:
        default_bus: messenger.bus.default

        buses:
            messenger.bus.default: ~
            event.bus:
                default_middleware:
                    enabled: true
                    allow_no_handlers: true

        transports:
            sync: 'sync://'

        routing: []

